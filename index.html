<!DOCTYPE html>
<html class="theme-dark" lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>backfun</title>
    <link rel="icon" type="image/png" href="images/avatar.png">

    <!-- Мета-теги для красивого превью (Open Graph) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="backfun">
    <meta property="og:description" content="Нишевая интернет микроселебрити. Пепеленд, хорроры, сюжетки, приколы — вот это всё здесь.">
    <meta property="og:url" content="https://backfun.fun/">
    <meta property="og:image" content="https://backfun.fun/images/avatar.png">

    <meta name="description" content="Нишевая интернет микроселебрити.">

    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/brands.css">
    
    <style>
        body { background: linear-gradient(135deg, #1f1f1f 0%, #1a1a1a 100%); color: #fff; font-family: sans-serif; overflow-x: hidden; margin: 0; }
        .container { padding-top: 50px; transition: 0.3s; }

        /* Бургер-иконка (три белые полоски) */
        .menu-btn { position: fixed; top: 20px; left: 20px; z-index: 1000; cursor: pointer; display: flex; flex-direction: column; gap: 5px; padding: 10px; }
        .menu-btn span { display: block; width: 25px; height: 3px; background: #fff; transition: 0.3s; border-radius: 2px; }

        /* Боковое меню */
        .side-menu { position: fixed; top: 0; left: -250px; width: 250px; height: 100%; background: #141414; z-index: 999; padding-top: 80px; transition: 0.3s; box-shadow: 5px 0 15px rgba(0,0,0,0.5); }
        .side-menu.active { left: 0; }
        .side-menu a { display: block; padding: 15px 25px; color: #888; text-decoration: none; font-size: 16px; transition: 0.2s; }
        .side-menu a:hover { background: #1a1a1a; color: #fff; }
        
        /* Активная полоска в цвет Бекфана (голубой/синий) */
        .side-menu a.active { color: #fff; border-left: 4px solid #00d4ff; background: #1a1a1a; }
        
        /* Заблокированный пункт (Вики) */
        .side-menu a.disabled { color: #333; cursor: not-allowed; display: flex; align-items: center; gap: 8px; font-size: 15px; }
        
        /* Кнопки доната в самом низу (почти незаметные) */
        .menu-footer { position: absolute; bottom: 20px; left: 0; width: 100%; border-top: 1px solid #1a1a1a; padding-top: 10px; }
        .menu-footer a { padding: 8px 25px; color: #222 !important; font-size: 11px; background: none !important; border: none !important; text-transform: uppercase; letter-spacing: 1px; }
        .menu-footer a:hover { color: #444 !important; }

        /* Покраска кнопок */
        .button-yt-alt { background-color: #ff0000 !important; color: #fff !important; }
    </style>
</head>
<body>

    <!-- Иконка меню -->
    <div class="menu-btn" onclick="toggleMenu()">
        <span></span>
        <span></span>
        <span></span>
    </div>

    <!-- Боковое меню -->
    <div class="side-menu" id="sideMenu">
        <a href="/" class="active">Ссылки</a>
        <a href="/gartic">Гартик</a>
        <a href="#" class="disabled">Вики &#128274;</a>
        
        <div class="menu-footer">
            <a href="https://finance.ozon.ru/apps/sbp/ozonbankpay/019e6e75-7f4c-7222-8abb-44f6e8a676c6" target="_blank">Купить псыжа Миске</a>
            <a href="https://www.donationalerts.com/r/backfun" target="_blank">Купить псыжа Бекфану</a>
        </div>
    </div>

    <div class="container">
        <div class="column">
            <img class="avatar avatar--rounded" src="images/avatar.png" alt="backfun">
            <h1>backfun</h1>
            <p>
                Нишевая интернет микроселебрити. Пепеленд, хорроры, сюжетки, приколы — вот это всё здесь
            </p>

            <div class="button-stack" role="navigation">
                <a class="button button-twitch" href="https://www.twitch.tv/backfun" target="_blank" rel="noopener">Twitch</a>
                <a class="button button-telegram" href="https://t.me/backfun_twitch" target="_blank" rel="noopener">Telegram</a>
                <a class="button button-discord" href="https://discord.gg/baGGhTHg" target="_blank" rel="noopener">Discord</a>
                <a class="button button-yt-alt" href="https://youtube.com/@mrbackfun?si=z7VRpJxRGETtIh2Q" target="_blank" rel="noopener">YouTube</a>
                <a class="button button-tiktok" href="https://www.tiktok.com/@backfun" target="_blank" rel="noopener">TikTok</a>
            </div>
        </div>
    </div>

    <footer style="text-align: center; margin-top: 50px; padding-bottom: 20px; font-family: sans-serif; font-size: 12px; color: #777; line-height: 1.6;">
        <p>Почта для сотрудничества: <a href="mailto:backfun@backfun.fun" style="color: #999; text-decoration: none;">backfun@backfun.fun</a></p>
        <p style="margin-top: 5px; color: #555;">Сделано Миской :3</p>
    </footer>

    <script>
        function toggleMenu() {
            document.getElementById('sideMenu').classList.toggle('active');
        }

        // Закрывать меню при клике вне его
        document.addEventListener('click', function(event) {
            var menu = document.getElementById('sideMenu');
            var btn = document.querySelector('.menu-btn');
            if (!menu.contains(event.target) && !btn.contains(event.target)) {
                menu.classList.remove('active');
            }
        });
    </script>
</body>
</html>
